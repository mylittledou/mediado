version: '3'

services:
  m3u8-downloader:
    build: .
    container_name: m3u8-downloader
    ports:
      - "5000:5000"
    volumes:
      - ./downloads:/app/downloads
      - ./logs:/app/logs
      - ./tasks.json:/app/tasks.json
      - ./thumbnails:/app/thumbnails
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - SECRET_KEY=your_secret_key_here
      - AUTH_USERNAME=admin
      - AUTH_PASSWORD=password
    networks:
      - m3u8-network

networks:
  m3u8-network:
    driver: bridge