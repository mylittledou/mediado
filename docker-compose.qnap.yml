version: '3'

services:
  m3u8-downloader:
    # 如果使用 GitHub Actions 自动打包，请替换为如下格式：
    image: ghcr.io/你的GitHub用户名/mediado:latest
    container_name: m3u8-downloader
    ports:
      # 左侧为访问端口，右侧为容器内部端口
      - "5000:5000"
    volumes:
      # 左侧为宿主机目录（请在 Container Station 中映射到实际共享文件夹）
      # 右侧为容器内部目录，不可修改
      - /share/Container/mediado/downloads:/app/downloads
      - /share/Container/mediado/logs:/app/logs
      # 注意：tasks.json需要在宿主机预先创建一个空文件，否则docker会把它当成目录映射
      - /share/Container/mediado/data/tasks.json:/app/tasks.json
      - /share/Container/mediado/thumbnails:/app/thumbnails
    restart: unless-stopped
    environment:
      # 设置时区
      - TZ=Asia/Shanghai
      # 安全密钥，用于 Session (建议修改为一个随机的长字符串)
      - SECRET_KEY=your_secret_key_here
      # 网页登录用户名
      - AUTH_USERNAME=admin
      # 网页登录密码
      - AUTH_PASSWORD=password
    networks:
      - m3u8-network

networks:
  m3u8-network:
    driver: bridge
